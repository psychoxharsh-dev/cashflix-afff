<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CashFlix Affiliate</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#F5F6FA;--white:#fff;--blue:#2563EB;--blue2:#1D4ED8;--blue-light:#EFF6FF;--blue-mid:#DBEAFE;--border:#E2E8F0;--text:#1E293B;--muted:#64748B;--green:#059669;--green-light:#ECFDF5;--red:#DC2626;--red-light:#FEF2F2;--yellow:#D97706;--yellow-light:#FFFBEB;--orange:#EA580C;--orange-light:#FFF7ED;--font:'Inter',sans-serif;--mono:'DM Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;min-height:100vh;}

/* AUTH */
#authScreen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;}
.auth-box{background:var(--white);border-radius:16px;padding:40px;width:94%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.auth-logo-icon{width:44px;height:44px;background:var(--orange);border-radius:12px;display:flex;align-items:center;justify-content:center;color:white;font-size:22px;}
.auth-logo-text{font-size:22px;font-weight:800;color:var(--text);}
.auth-logo-text span{color:var(--orange);}
.auth-sub{color:var(--muted);font-size:13px;margin-bottom:28px;padding-left:54px;}
.tab-row{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:20px;border:1px solid var(--border);}
.tab-btn{flex:1;padding:9px;border:none;background:transparent;color:var(--muted);font-family:var(--font);font-size:14px;font-weight:500;border-radius:7px;cursor:pointer;transition:.2s;}
.tab-btn.on{background:var(--white);color:var(--orange);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.inp{width:100%;padding:11px 14px 11px 40px;background:var(--white);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;margin-bottom:12px;transition:.2s;position:relative;}
.inp:focus{border-color:var(--orange);}
.inp::placeholder{color:#94A3B8;}
.inp-wrap{position:relative;margin-bottom:12px;}
.inp-wrap .inp{margin-bottom:0;padding-left:40px;}
.inp-wrap .inp-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#94A3B8;font-size:15px;}
.btn-full{width:100%;padding:13px;background:var(--orange);border:none;border-radius:10px;color:white;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-full:hover{background:#C2410C;}
.auth-msg{font-size:12px;text-align:center;margin-top:10px;min-height:18px;}
.auth-msg.err{color:var(--red);}
.auth-msg.ok{color:var(--green);}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--muted);}
.auth-switch span{color:var(--orange);cursor:pointer;font-weight:500;}

/* SIDEBAR */
.sidebar{width:240px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;transition:transform .3s;}
.logo{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.logo-icon{width:36px;height:36px;background:var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-size:16px;font-weight:800;flex-shrink:0;}
.logo-text{font-size:16px;font-weight:800;color:var(--text);}
.logo-text span{color:var(--orange);}
.logo-sub{font-size:11px;color:var(--muted);}
.nav-sec{padding:16px 16px 4px;font-size:10px;font-weight:600;color:#94A3B8;letter-spacing:1.5px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13.5px;font-weight:500;color:var(--muted);transition:.15s;border-radius:8px;margin:1px 8px;}
.nav-item:hover{color:var(--text);background:var(--bg);}
.nav-item.on{color:var(--orange);background:var(--orange-light);font-weight:600;}
.nav-icon{width:20px;text-align:center;font-size:15px;}
.sidebar-bottom{padding:16px;border-top:1px solid var(--border);margin-top:auto;}
.user-card{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg);border-radius:10px;}
.user-av{width:34px;height:34px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px;flex-shrink:0;}
.user-name{font-size:13px;font-weight:600;color:var(--text);}
.user-email{font-size:11px;color:var(--muted);}
.logout-btn{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px;}
.logout-btn:hover{color:var(--red);}

/* TOPBAR */
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar h1{font-size:17px;font-weight:700;color:var(--text);}
.balance-pill{background:var(--orange-light);color:var(--orange);font-weight:700;font-size:15px;padding:7px 16px;border-radius:20px;border:1px solid #FED7AA;}
.hburg{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;}

/* CONTENT */
.content{padding:20px;flex:1;}
.page{display:none;}.page.on{display:block;}

/* DASHBOARD STATS */
.stats-row{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:16px;}
.stat-icon-wrap{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.stat-icon-wrap.orange{background:var(--orange-light);}
.stat-icon-wrap.green{background:var(--green-light);}
.stat-icon-wrap.blue{background:var(--blue-light);}
.stat-lbl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.stat-val{font-size:26px;font-weight:800;color:var(--text);margin:2px 0;}
.stat-sub{font-size:11px;color:var(--muted);}

/* CHART CARD */
.chart-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:20px;}
.chart-card h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;}
.date-range{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--muted);margin-bottom:12px;cursor:pointer;}

/* EARNINGS CARD */
.earnings-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:20px;}
.earnings-card h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.earnings-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.earnings-row:last-child{border-bottom:none;font-weight:700;}
.earnings-label{display:flex;align-items:center;gap:8px;font-size:13px;}
.earnings-amount{font-size:14px;font-weight:600;color:var(--text);}

/* CAMPAIGNS */
.camp-header{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:12px;}
.camp-header h3{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
.camp-header p{font-size:13px;color:var(--muted);margin-top:4px;}
.search-box{width:100%;padding:10px 14px 10px 40px;background:var(--white);border:1.5px solid var(--border);border-radius:10px;font-family:var(--font);font-size:14px;outline:none;margin-bottom:12px;color:var(--text);}
.search-box:focus{border-color:var(--orange);}
.search-wrap{position:relative;}
.search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;}

/* OFFER LIST */
.offer-list{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.offer-header-row{display:grid;grid-template-columns:60px 1fr 100px 80px 80px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.offer-row{display:grid;grid-template-columns:60px 1fr 100px 80px 80px;padding:14px 16px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:.15s;}
.offer-row:last-child{border-bottom:none;}
.offer-row:hover{background:var(--bg);}
.offer-id{font-size:13px;font-weight:700;color:var(--text);}
.offer-name-wrap{display:flex;align-items:center;gap:10px;}
.offer-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0;}
.offer-name{font-size:13px;font-weight:600;color:var(--orange);}
.offer-cat{display:inline-block;padding:3px 10px;background:var(--blue-light);color:var(--blue);border-radius:20px;font-size:11px;font-weight:600;}
.offer-status{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:var(--green-light);color:var(--green);border-radius:20px;font-size:11px;font-weight:600;}
.offer-payout{font-size:13px;font-weight:700;color:var(--text);}

/* OFFER DETAIL PAGE */
.offer-detail-header{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;gap:16px;}
.offer-detail-avatar{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:white;flex-shrink:0;}
.offer-detail-name{font-size:18px;font-weight:800;color:var(--text);}
.offer-detail-meta{font-size:12px;color:var(--muted);margin-top:4px;}
.payout-badge{display:inline-flex;align-items:center;gap:4px;background:var(--green-light);color:var(--green);padding:5px 12px;border-radius:20px;font-size:13px;font-weight:700;margin-left:10px;}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:var(--green-light);color:var(--green);border-radius:20px;font-size:12px;font-weight:600;margin-top:6px;}

/* SECTION CARDS */
.section-card{background:var(--white);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;}
.section-head{padding:14px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;border-bottom:1px solid var(--border);}
.section-head-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.section-head-icon.green{background:var(--green-light);}
.section-head-icon.orange{background:var(--orange-light);}
.section-head-icon.blue{background:var(--blue-light);}
.section-head-icon.red{background:var(--red-light);}
.section-title{font-size:14px;font-weight:700;color:var(--text);}
.section-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.section-body{padding:16px 20px;}

/* LINK BOX */
.link-label{font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px;}
.link-box{display:flex;gap:8px;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px;}
.link-text{font-family:var(--mono);font-size:12px;color:var(--text);flex:1;word-break:break-all;}
.copy-btn{flex-shrink:0;background:var(--orange);color:white;padding:8px 16px;border-radius:8px;font-size:12px;cursor:pointer;border:none;font-weight:600;display:flex;align-items:center;gap:6px;}
.copy-btn:hover{background:#C2410C;}

/* MACROS */
.macro-section{margin-bottom:14px;}
.macro-title{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;}
.macro-chips{display:flex;flex-wrap:wrap;gap:6px;}
.macro-chip{padding:5px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:var(--mono);color:var(--text);cursor:pointer;transition:.15s;}
.macro-chip:hover{border-color:var(--orange);color:var(--orange);}
.macro-chip.active{border-color:var(--orange);background:var(--orange-light);color:var(--orange);}

/* GOALS */
.goal-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
.goal-row:last-child{border-bottom:none;}
.goal-name{font-weight:500;color:var(--text);}
.goal-num{font-weight:600;color:var(--muted);}

/* STATS GRID */
.camp-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.camp-stat{display:flex;flex-direction:column;align-items:center;background:var(--bg);border-radius:12px;padding:16px;border:1px solid var(--border);}
.camp-stat-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:8px;font-size:20px;}
.camp-stat-icon.blue{background:var(--blue);}
.camp-stat-icon.green{background:var(--green);}
.camp-stat-icon.orange{background:var(--orange);}
.camp-stat-icon.gray{background:#64748B;}
.camp-stat-val{font-size:20px;font-weight:800;color:var(--text);}
.camp-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

/* POSTBACK */
.pb-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:8px;}
.pb-item-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}

/* WITHDRAW */
.balance-big{background:linear-gradient(135deg,var(--orange),#F97316);border-radius:14px;padding:20px;margin-bottom:20px;color:white;}
.balance-big-lbl{font-size:11px;opacity:.8;text-transform:uppercase;letter-spacing:1px;}
.balance-big-val{font-size:36px;font-weight:800;margin-top:4px;}

/* FORM */
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;background:var(--white);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:.2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--orange);}
.form-group textarea{resize:vertical;min-height:80px;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-bg.show{display:flex;}
.modal{background:var(--white);border-radius:18px;padding:26px;width:94%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-head h3{font-size:17px;font-weight:700;color:var(--text);}
.x-btn{background:var(--bg);border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:8px;font-size:16px;cursor:pointer;}

/* BTN */
.btn{padding:9px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:.15s;}
.btn-orange{background:var(--orange);color:white;}.btn-orange:hover{background:#C2410C;}
.btn-ghost{background:var(--bg);color:var(--text);border:1px solid var(--border);}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid #FECACA;}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-back{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;padding:0;margin-bottom:14px;}
.btn-back:hover{color:var(--text);}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:90;}
.overlay.show{display:block;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast-item{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,0.12);animation:slideIn .3s ease;min-width:260px;color:var(--text);}
.toast-item.ok{border-left:4px solid var(--green);}
.toast-item.err{border-left:4px solid var(--red);}
@keyframes slideIn{from{opacity:0;transform:translateY(20px);}}

/* CONSOLE */
.console-box{background:#0F172A;border-radius:10px;padding:14px;font-family:var(--mono);font-size:12px;min-height:160px;max-height:320px;overflow-y:auto;}
.log-entry{padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;gap:10px;}
.log-time{color:#475569;min-width:65px;}
.log-ok{color:#34D399;}
.log-err{color:#F87171;}
.log-url{color:#60A5FA;word-break:break-all;}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .hburg{display:block}
  .offer-header-row{display:none}
  .offer-row{grid-template-columns:1fr auto}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-icon">⚡</div>
      <div class="auth-logo-text">Cash<span>Flix</span></div>
    </div>
    <p class="auth-sub">Affiliate Panel</p>
    <div class="tab-row">
      <button class="tab-btn on" id="tabLogin" onclick="switchTab('login')">Sign in</button>
      <button class="tab-btn" id="tabSignup" onclick="switchTab('signup')">Create account</button>
    </div>
    <div id="loginForm">
      <div class="inp-wrap"><span class="inp-icon">✉</span><input class="inp" id="loginEmail" type="email" placeholder="e.g. name@gmail.com"></div>
      <div class="inp-wrap"><span class="inp-icon">🔒</span><input class="inp" id="loginPass" type="password" placeholder="Password"></div>
      <button class="btn-full" onclick="doLogin()">➔ Log in</button>
    </div>
    <div id="signupForm" style="display:none">
      <div class="inp-wrap"><span class="inp-icon">👤</span><input class="inp" id="signupName" type="text" placeholder="What should we call you?"></div>
      <div class="inp-wrap"><span class="inp-icon">✉</span><input class="inp" id="signupEmail" type="email" placeholder="e.g. name@gmail.com"></div>
      <div class="inp-wrap"><span class="inp-icon">📱</span><input class="inp" id="signupPhone" type="tel" placeholder="10-digit number"></div>
      <div class="inp-wrap"><span class="inp-icon">🔒</span><input class="inp" id="signupPass" type="password" placeholder="At least 6 characters"></div>
      <button class="btn-full" id="signupBtn" onclick="doSignup()">👤 Sign up</button>
    </div>
    <div class="auth-msg" id="authMsg"></div>
    <div class="auth-switch" id="authSwitch">
      <span id="switchText">Been here before? <span onclick="switchTab('login')">Log in</span></span>
    </div>
  </div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div><div class="logo-text">Cash<span>Flix</span></div><div class="logo-sub">Affiliate panel</div></div>
  </div>
  <nav style="flex:1;overflow-y:auto;padding:8px 0">
    <div class="nav-sec">MAIN</div>
    <div class="nav-item on" onclick="go('dashboard',this)"><span class="nav-icon">🏠</span> Dashboard</div>
    <div class="nav-item" onclick="go('campaigns',this)"><span class="nav-icon">📢</span> Campaigns</div>
    <div class="nav-item" onclick="go('postback',this)"><span class="nav-icon">🔗</span> Postback</div>
    <div class="nav-sec">FINANCE</div>
    <div class="nav-item" onclick="go('withdraw',this)"><span class="nav-icon">💸</span> Withdraw</div>
    <div class="nav-item" onclick="go('withhistory',this)"><span class="nav-icon">🕐</span> Withdraw Histor
